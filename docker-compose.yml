services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       habitflow
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de schema executado automaticamente na primeira inicialização do container
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d habitflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL:      jdbc:postgresql://db:5432/habitflow
      DB_USER:     postgres
      DB_PASSWORD: postgres
      PORT:        "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
