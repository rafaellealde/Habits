services:

  - type: web
    name: habitflow-api
    runtime: docker
    plan: free
    # Render injeta PORT automaticamente; App.java já lê essa variável
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habitflow-db
          property: connectionString
    healthCheckPath: /habits

  - type: web
    name: habitflow-frontend
    runtime: docker
    plan: free
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      # Após o primeiro deploy do backend, confirme o valor no dashboard do Render.
      # Padrão do Render: https://<nome-do-serviço>.onrender.com
      - key: API_BASE_URL
        value: https://habitflow-api.onrender.com

databases:
  - name: habitflow-db
    plan: free
    databaseName: habitflow
    user: habitflow_user
